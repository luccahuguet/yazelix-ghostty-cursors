name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check
      - run: cargo check --all-targets
      - run: cargo test
      - run: cargo run --bin yzc -- --help
      - run: |
          tmp="$(mktemp -d)"
          cargo run --bin yzc -- --config-dir "$tmp/config" --share-dir assets/ghostty init
          cargo run --bin yzc -- --config-dir "$tmp/config" --share-dir assets/ghostty generate ghostty
          test -s "$tmp/config/ghostty.conf"

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix flake check
      - run: nix build .#yazelix_cursors --no-link
      - run: nix run .#yzc -- --help
